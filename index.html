<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NexPoint Agency — Katalog Properti</title>

  <meta name="description" content="Katalog properti NexPoint Agency — kavling, tanah, dan villa.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="site-header">
  <div class="container header-inner">
    <div class="brand">
      <div class="logo">NP</div>
      <div class="brand-text">
        <h1>NexPoint Agency</h1>
        <p class="tag">Temukan Investasi Properti Impian Anda</p>
      </div>
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-text">
        <h2>Investasi Properti — <span class="accent">Mudah dan Aman</span></h2>
        <p class="lead">
          Katalog properti pilihan untuk investasi dan hunian terbaik.
        </p>
      </div>
    </div>
  </section>

  <!-- CATALOG -->
  <section id="catalog" class="catalog container">
    <h3 class="section-title">Katalog Properti</h3>
    <div id="cards" class="cards-grid"></div>
  </section>

  <!-- CONTACT -->
  <section class="contacts container">
    <h2 class="section-title">Hubungi Kami</h2>
    <div class="contacts-grid">

      <div class="contact-card">
        <div class="avatar">R</div>
        <div>
          <div class="name">Rifky Rangga</div>
          <a class="wa-link" href="https://wa.me/62895365282575" target="_blank">
            +62 895-3652-82575
          </a>
        </div>
      </div>

      <div class="contact-card">
        <div class="avatar">A</div>
        <div>
          <div class="name">Andi Pratama</div>
          <a class="wa-link" href="https://wa.me/6281234567890" target="_blank">
            +62 812-3456-7890
          </a>
        </div>
      </div>

    </div>
  </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div>© <span id="year"></span> NexPoint Agency</div>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->
<script>
const cardsContainer = document.getElementById('cards');

async function loadProperties() {
  try {
    const res = await fetch('properties.json');
    const properties = await res.json();

    cardsContainer.innerHTML = properties.map(p => `
      <article class="card">

        <a href="detail.html?id=${p.id}" class="card-media">
          <img src="${p.image}" alt="${p.title}">
        </a>

        <div class="card-body">
          <h4 class="card-title">
            <a href="detail.html?id=${p.id}" style="color:inherit;text-decoration:none">
              ${p.title}
            </a>
          </h4>

          <p class="card-desc">${p.short}</p>
          <div class="card-price">${p.price}</div>

          <div class="card-actions">
            <a class="btn small outline"
               href="https://wa.me/${p.contact}?text=${encodeURIComponent(
                 'Halo, saya tertarik dengan ' + p.title
               )}"
               target="_blank"
               onclick="event.stopPropagation()">
              Hubungi via WhatsApp
            </a>
          </div>

        </div>

      </article>
    `).join('');

  } catch (err) {
    cardsContainer.innerHTML = '<p class="error">Gagal memuat data.</p>';
  }
}

document.getElementById('year').textContent = new Date().getFullYear();
loadProperties();
</script>
  
</body>
</html>
